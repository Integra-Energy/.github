name: Add to project board

on:
  workflow_call:
    secrets:
      ADD_TO_PROJECT_PAT:
        required: true

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - id: add
        uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/orgs/Integra-Energy/projects/1
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}

      - name: Stamp Codebase field with the source repo
        if: steps.add.outputs.itemId != ''
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          ITEM_ID: ${{ steps.add.outputs.itemId }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          DATA=$(gh api graphql -f query='
            query($org:String!, $num:Int!) {
              organization(login:$org) {
                projectV2(number:$num) {
                  id
                  field(name:"Codebase") {
                    ... on ProjectV2SingleSelectField { id options { id name } }
                  }
                }
              }
            }' -f org="Integra-Energy" -F num=1)
          PROJECT_ID=$(echo "$DATA" | jq -r '.data.organization.projectV2.id')
          FIELD_ID=$(echo "$DATA" | jq -r '.data.organization.projectV2.field.id')
          OPTION_ID=$(echo "$DATA" | jq -r --arg n "$REPO_NAME" '.data.organization.projectV2.field.options[] | select(.name==$n) | .id')
          if [ -z "$OPTION_ID" ] || [ "$OPTION_ID" = "null" ]; then
            echo "No Codebase option matches '$REPO_NAME' — skipping."
            exit 0
          fi
          gh api graphql -f query='
            mutation($project:ID!, $item:ID!, $field:ID!, $option:String!) {
              updateProjectV2ItemFieldValue(input:{
                projectId:$project, itemId:$item, fieldId:$field,
                value:{ singleSelectOptionId:$option }
              }) { projectV2Item { id } }
            }' -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$FIELD_ID" -f option="$OPTION_ID"
          echo "Set Codebase=$REPO_NAME on $ITEM_ID"
