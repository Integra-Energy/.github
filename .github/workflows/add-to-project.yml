name: Add to project board

on:
  workflow_call:
    secrets:
      ADD_TO_PROJECT_PAT:
        required: true

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/orgs/Integra-Energy/projects/1
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
