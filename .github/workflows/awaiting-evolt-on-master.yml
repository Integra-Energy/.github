name: Move linked issues to Awaiting Evolt

# Reusable workflow. Call it from a repo on pushes to master; for every issue that a
# merged PR in that push closes (Closes/Fixes/Resolves #N), set the board Status to
# "Awaiting Evolt". The issue is left OPEN — it only moves columns, it does not close.

on:
  workflow_call:
    secrets:
      ADD_TO_PROJECT_PAT:
        required: true

jobs:
  awaiting-evolt:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to Awaiting Evolt
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail
          STATUS_NAME="Awaiting Evolt"
          ORG="Integra-Energy"
          PROJECT_NUMBER=1

          # 1. Commits newly on master in this push (compare handles >20; first push has a zero BEFORE).
          if [[ "$BEFORE" =~ ^0+$ ]]; then
            COMMITS=$(gh api "repos/$OWNER/$REPO/commits?sha=$AFTER&per_page=50" --jq '.[].sha')
          else
            COMMITS=$(gh api "repos/$OWNER/$REPO/compare/$BEFORE...$AFTER" --jq '.commits[].sha')
          fi

          # 2. PRs that introduced those commits.
          PRS=""
          for SHA in $COMMITS; do
            P=$(gh api "repos/$OWNER/$REPO/commits/$SHA/pulls" --jq '.[].number' 2>/dev/null || true)
            PRS="$PRS $P"
          done
          PRS=$(echo "$PRS" | tr ' ' '\n' | grep -E '^[0-9]+$' | sort -u || true)

          # 3. Issues those PRs close (Closes/Fixes/Resolves #N in the PR body).
          ISSUES=""
          for PR in $PRS; do
            BODY=$(gh api "repos/$OWNER/$REPO/pulls/$PR" --jq '.body // ""' || echo "")
            REFS=$(printf '%s' "$BODY" | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+' | grep -oE '[0-9]+' || true)
            ISSUES="$ISSUES $REFS"
          done
          ISSUES=$(echo "$ISSUES" | tr ' ' '\n' | grep -E '^[0-9]+$' | sort -u || true)

          if [ -z "$ISSUES" ]; then
            echo "No closing issue references found in this push — nothing to move."
            exit 0
          fi

          # 4. Project + Status field metadata.
          DATA=$(gh api graphql -f query='
            query($org:String!, $num:Int!) {
              organization(login:$org) {
                projectV2(number:$num) {
                  id
                  field(name:"Status") {
                    ... on ProjectV2SingleSelectField { id options { id name } }
                  }
                }
              }
            }' -f org="$ORG" -F num="$PROJECT_NUMBER")
          PROJECT_ID=$(echo "$DATA" | jq -r '.data.organization.projectV2.id')
          FIELD_ID=$(echo "$DATA" | jq -r '.data.organization.projectV2.field.id')
          OPTION_ID=$(echo "$DATA" | jq -r --arg n "$STATUS_NAME" '.data.organization.projectV2.field.options[] | select(.name==$n) | .id')
          if [ -z "$OPTION_ID" ] || [ "$OPTION_ID" = "null" ]; then
            echo "Status option '$STATUS_NAME' not found on the board — skipping."
            exit 0
          fi

          # 5. For each issue: ensure it's on the board (idempotent) and set Status. Issue stays OPEN.
          for N in $ISSUES; do
            CONTENT_ID=$(gh api "repos/$OWNER/$REPO/issues/$N" --jq '.node_id')
            ITEM_ID=$(gh api graphql -f query='
              mutation($project:ID!, $content:ID!) {
                addProjectV2ItemById(input:{projectId:$project, contentId:$content}) { item { id } }
              }' -f project="$PROJECT_ID" -f content="$CONTENT_ID" --jq '.data.addProjectV2ItemById.item.id')
            gh api graphql -f query='
              mutation($project:ID!, $item:ID!, $field:ID!, $option:String!) {
                updateProjectV2ItemFieldValue(input:{
                  projectId:$project, itemId:$item, fieldId:$field,
                  value:{ singleSelectOptionId:$option }
                }) { projectV2Item { id } }
              }' -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$FIELD_ID" -f option="$OPTION_ID"
            echo "Moved issue #$N -> $STATUS_NAME"
          done
